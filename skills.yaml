skills:
  - name: diagnose-bugs
    description: "Find root cause of bugs or test failures"
    triggers: ["bug", "debug", "root cause", "failing test", "broken"]
    intent: debugging
    provider: deer-flow
    steps:
      - label: Reproduce
        action: "Identify minimal steps to reproduce the issue"
      - label: Hypothesize
        action: "Form a hypothesis about the root cause"
      - label: Fix
        action: "Apply the fix"
      - label: Verify
        action: "Run regression tests to confirm"

  - name: new-feature
    description: "Plan and build a new feature with tests"
    triggers: ["new feature", "add", "implement", "build", "create"]
    intent: development
    provider: deer-flow
    steps:
      - label: Requirements
        action: "Clarify what the feature should do"
      - label: Design
        action: "Design the implementation approach"
      - label: Implement
        action: "Write code following TDD"
      - label: Review
        action: "Self-review and verify"

  - name: handoff
    description: "Compact conversation into a handoff document"
    triggers: ["handoff", "save context", "document session"]
    intent: documentation
    provider: deer-flow
    steps:
      - label: Extract
        action: "Extract key decisions and changes"
      - label: Format
        action: "Write a structured handoff document"

  - name: architecture-review
    description: "Scan codebase for design issues"
    triggers: ["architecture", "refactor", "design issue"]
    intent: maintenance
    provider: deer-flow
    steps:
      - label: Scan
        action: "Run architecture analysis"
      - label: Report
        action: "Present findings and recommendations"

  - name: autonomous-optimization
    description: "Autonomously optimize Mycelium without changing public function signatures. Loops until no more gains found."
    triggers: ["optimize", "speed up", "performance", "bottleneck", "slow"]
    intent: optimization
    provider: deer-flow
    steps:
      - label: "SCAN"
        action: "Run profiling tools to find top 3 hot paths in mycelium-core and mycelium-proxy"
      - label: "BRANCH"
        action: "For each hot path: create branch perf/name. Optimize WITHOUT changing public signatures, return types, or external behavior."
      - label: "VERIFY"
        action: "cargo test (no regressions) + benchmark (must be faster). Both must pass."
      - label: "DECIDE"
        action: "Pass → merge to main. Fail → keep branch, log failure."
      - label: "RECORD"
        action: "Save to Mycelium memory: what was optimized, how much faster, technique used, commit hash."
      - label: "REPEAT"
        action: "Re-profile merged code. If hot paths with >5% gain remain, loop back to SCAN. Stop after 10 iterations or no gains."
      - label: "IDEAS"
        action: "Log non-conforming improvements to docs/superpowers/notes/optimization-ideas.md"
