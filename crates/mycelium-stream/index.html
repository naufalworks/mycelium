<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mycelium Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --soil: #14100c; --soil-mid: #1e1814; --soil-light: #28201a;
      --pulse: #00ff8c; --pulse-rgb: 0,255,140;
      --alert: #f09040; --deep: #7050d0;
      --cap: #d0c8c0;
      --glass-bg: rgba(20,16,12,0.5); --glass-border: rgba(208,200,192,0.08);
    }
    body{background:var(--soil);color:var(--cap);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw;cursor:default;user-select:none}
    #canvas{position:fixed;top:0;left:0;width:100vw;height:100vh}
    #ui{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:10}
    #brand{position:absolute;top:22px;left:28px}
    #brand .organism{font-family:'Instrument Serif','Georgia',serif;font-size:20px;font-style:italic;color:rgba(0,255,140,0.75);line-height:1.2}
    #brand .organism em{font-style:italic;color:rgba(208,200,192,0.25)}
    #brand .sub{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(208,200,192,0.15);margin-top:4px}
    #brand .status{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--pulse);margin-right:5px;box-shadow:0 0 6px rgba(0,255,140,0.3);vertical-align:middle;position:relative;top:-1px}
    #stats{position:absolute;top:22px;right:28px;display:flex;gap:1px;background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:10px;padding:10px 18px;pointer-events:auto}
    #stats .stat{text-align:right;padding:0 14px;border-right:1px solid rgba(208,200,192,0.06)}
    #stats .stat:last-child{border-right:none}
    #stats .stat .num{font-family:'JetBrains Mono','SF Mono',monospace;font-size:18px;font-weight:400;color:rgba(208,200,192,0.85);line-height:1.2}
    #stats .stat .num .trend{font-size:10px;font-weight:300;color:rgba(0,255,140,0.4);margin-left:2px}
    #stats .stat .label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(208,200,192,0.2);margin-top:1px}
    #alerts{position:absolute;bottom:32px;right:28px;display:flex;flex-direction:column;gap:4px;pointer-events:auto}
    #alerts .alert{display:flex;align-items:flex-start;gap:6px;padding:5px 10px;background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:8px;max-width:260px;font-size:9px;line-height:1.4;color:rgba(208,200,192,0.55)}
    #alerts .alert .icon{width:6px;height:6px;border-radius:50%;margin-top:4px;flex-shrink:0}
    #alerts .alert .icon.pattern{background:#f09040;box-shadow:0 0 8px rgba(240,144,64,0.4)}
    #alerts .alert .icon.merge{background:#7050d0;box-shadow:0 0 8px rgba(112,80,208,0.3)}
    #alerts .alert .icon.evolve{background:#00ff8c;box-shadow:0 0 8px rgba(0,255,140,0.3)}
    #alerts .alert strong{font-weight:500;color:rgba(208,200,192,0.75)}
    #pulse-meter{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;pointer-events:auto}
    #pulse-meter .label{font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(208,200,192,0.15)}
    #pulse-meter .wave{width:24px;height:3px;background:rgba(208,200,192,0.04);border-radius:2px;overflow:hidden}
    #pulse-meter .wave .fill{height:100%;width:0%;background:var(--pulse);border-radius:2px;transition:width .1s}
    #timeline{position:absolute;bottom:32px;right:50%;transform:translateX(50%);display:flex;align-items:center;gap:6px;pointer-events:auto;margin-right:12px}
    #timeline .label{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:rgba(208,200,192,0.15)}
    #timeline .track{position:relative;width:60px;height:2px;background:rgba(208,200,192,0.04);border-radius:1px}
    #timeline .track .fill{height:100%;width:60%;background:linear-gradient(90deg,rgba(0,255,140,0.3),rgba(0,255,140,0.7));border-radius:1px}
    #timeline .track .now{position:absolute;right:-3px;top:-2px;width:6px;height:6px;border-radius:50%;background:rgba(208,200,192,0.5);box-shadow:0 0 6px rgba(0,255,140,0.3)}
    #search{position:absolute;bottom:90px;left:28px;pointer-events:auto}
    #search .trigger{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:10px;font-size:10px;color:rgba(208,200,192,0.25)}
    #search .trigger kbd{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 5px;background:rgba(208,200,192,0.04);border-radius:3px;color:rgba(208,200,192,0.15);border:1px solid rgba(208,200,192,0.04)}
    #legend{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);display:flex;gap:14px;padding:5px 12px;background:var(--glass-bg);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:20px;opacity:0;transition:opacity .5s}
    #legend.visible{opacity:1}
    #legend .item{display:flex;align-items:center;gap:4px;font-size:7px;letter-spacing:1px;text-transform:uppercase;color:rgba(208,200,192,0.12)}
    #legend .item .dot{width:5px;height:5px;border-radius:50%}
  </style>
</head><body></body></html>
